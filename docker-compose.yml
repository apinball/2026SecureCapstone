services:
  # 1. Nginx Proxy
  proxy-server:
    build: ./nginx
    container_name: pqc-proxy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - TLS_STAGE=${TLS_STAGE:-1}
      - OPENSSL_CONF=/opt/openssl/ssl/openssl.cnf
    depends_on:
      - backend-api
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/ -o /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - pqc-network

  # 2. 백엔드 (FastAPI Backend)
  backend-api:
    build: ./backend
    container_name: service-backend
    volumes:
      - ./backend:/app
    environment:
      - ENV=development
    networks:
      - pqc-network

  # 3. 테스터 (Kali Linux)
  test-client:
    build:
      context: .
      dockerfile: tester/Dockerfile
    container_name: tls-tester
    volumes:
      - ./tester/captures:/data
    command: tail -f /dev/null
    networks:
      - pqc-network

networks:
  pqc-network:
    driver: bridge