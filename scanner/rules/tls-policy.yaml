rules:
  - id: nginx-weak-tls-protocol
    message: "TLSv1.0 or TLSv1.1 detected in ssl_protocols — upgrade to TLSv1.2/1.3 only"
    languages: [generic]
    severity: ERROR
    patterns:
      - pattern: ssl_protocols ... TLSv1; ...
      - pattern-not: ssl_protocols ... TLSv1.2 ...
      - pattern-not: ssl_protocols ... TLSv1.3 ...

  - id: nginx-weak-ssl-ciphers-rc4
    message: "Weak cipher RC4 detected in ssl_ciphers — remove immediately"
    languages: [generic]
    severity: ERROR
    patterns:
      - pattern: ssl_ciphers ... RC4 ...

  - id: nginx-weak-ssl-ciphers-des
    message: "Weak cipher DES detected in ssl_ciphers — remove immediately"
    languages: [generic]
    severity: ERROR
    patterns:
      - pattern: ssl_ciphers ... DES ...
